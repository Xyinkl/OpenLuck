<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenLuck — 历史记录</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23209cee'/%3E%3Crect x='2' y='2' width='28' height='28' rx='3' fill='none' stroke='%23212529' stroke-width='2'/%3E%3Ccircle cx='10' cy='9' r='2.5' fill='%23fff'/%3E%3Ccircle cx='22' cy='9' r='2.5' fill='%23fff'/%3E%3Ccircle cx='10' cy='16' r='2.5' fill='%23fff'/%3E%3Ccircle cx='22' cy='16' r='2.5' fill='%23fff'/%3E%3Ccircle cx='10' cy='23' r='2.5' fill='%23fff'/%3E%3Ccircle cx='22' cy='23' r='2.5' fill='%23fff'/%3E%3C/svg%3E">
<style>
/* ══════════════════════════════════════════════════════
   DESIGN SYSTEM — mirrors index.html
══════════════════════════════════════════════════════ */
:root {
  --black:    #212529;
  --white:    #fff;
  --blue:     #209cee;
  --blue-d:   #006bb3;
  --yellow:   #f7d51d;
  --yellow-d: #e59400;
  --red:      #e76e55;
  --red-d:    #8c2022;
  --green:    #92cc41;
  --green-d:  #4aa52e;
  --shadow:   #adafbc;
  --dim:      #777;
  --header-h: 72px;
  --pb5: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='5' height='5'%3E%3Cpath d='M2 1 h1 v1 h-1 z M1 2 h1 v1 h-1 z M3 2 h1 v1 h-1 z M2 3 h1 v1 h-1 z' fill='%23212529'/%3E%3C/svg%3E");
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--white); }
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  color: var(--black);
}

/* ─── GLOBAL HEADER ──────────────────────────────── */
.global-header {
  height: var(--header-h);
  width: 100%;
  flex-shrink: 0;
  background: var(--white);
  display: flex;
  align-items: stretch;
  position: relative;
  z-index: 10;
}
.header-inner {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.global-header .logo { font-size: 48px; }
.global-header h1    { font-size: 16px; font-weight: 700; }
.global-header p     { font-size: 12px; color: var(--dim); margin-top: 4px; }
.global-header nav   { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ─── BUTTONS ────────────────────────────────────── */
.btn {
  border-style: solid; border-width: 4px;
  border-image-slice: 2; border-image-width: 2;
  border-image-outset: 2; border-image-source: var(--pb5);
  border-image-repeat: stretch;
  position: relative; display: inline-flex;
  align-items: center; justify-content: center; gap: 5px;
  padding: 6px 10px; margin: 6px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px; font-weight: 700;
  white-space: nowrap; cursor: pointer;
  background: var(--white); color: var(--black);
  text-decoration: none; user-select: none;
  vertical-align: middle; outline: none;
}
.btn::after {
  position: absolute; top: -4px; right: -4px; bottom: -4px; left: -4px;
  content: ""; box-shadow: inset -4px -4px var(--shadow);
}
.btn:hover { background: #e7e7e7; }
.btn:hover::after { box-shadow: inset -6px -6px var(--shadow); }
.btn:active::after { box-shadow: inset 4px 4px var(--shadow); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.btn-blue   { background: var(--blue);   color: var(--white); }
.btn-blue::after   { box-shadow: inset -4px -4px var(--blue-d); }
.btn-blue:hover    { background: #108de0; }
.btn-blue:hover::after   { box-shadow: inset -6px -6px var(--blue-d); }
.btn-blue:active::after  { box-shadow: inset 4px 4px var(--blue-d); }

.btn-yellow { background: var(--yellow); color: var(--black); }
.btn-yellow::after { box-shadow: inset -4px -4px var(--yellow-d); }
.btn-yellow:hover  { background: #f2c409; }
.btn-yellow:hover::after { box-shadow: inset -6px -6px var(--yellow-d); }
.btn-yellow:active::after { box-shadow: inset 4px 4px var(--yellow-d); }

.btn-red    { background: var(--red);    color: var(--white); }
.btn-red::after    { box-shadow: inset -4px -4px var(--red-d); }
.btn-red:hover     { background: #ce372b; }
.btn-red:hover::after    { box-shadow: inset -6px -6px var(--red-d); }
.btn-red:active::after   { box-shadow: inset 4px 4px var(--red-d); }

.btn-sm { padding: 4px 7px; font-size: 12px; }
.btn-lg { padding: 8px 15px; font-size: 16px; }

/* ─── NAV BUTTONS ────────────────────────────────── */
.nav-btn {
  border-style: solid; border-width: 4px;
  border-image-slice: 2; border-image-width: 2;
  border-image-outset: 2; border-image-source: var(--pb5);
  position: relative; display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 9px; margin: 6px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px; font-weight: 700;
  white-space: nowrap; text-decoration: none; cursor: pointer; user-select: none;
}
.nav-btn::after {
  position: absolute; top: -4px; right: -4px; bottom: -4px; left: -4px;
  content: ""; box-shadow: inset -4px -4px var(--shadow);
}
.nav-btn-blue { background: var(--blue); color: var(--white); }
.nav-btn-blue::after { box-shadow: inset -4px -4px var(--blue-d); }
.nav-btn-blue:hover { background: #108de0; }
.nav-btn-blue:hover::after { box-shadow: inset -6px -6px var(--blue-d); }
.nav-btn-red { background: var(--red); color: var(--white); }
.nav-btn-red::after { box-shadow: inset -4px -4px var(--red-d); }
.nav-btn-red:hover { background: #ce372b; }
.nav-btn-red:hover::after { box-shadow: inset -6px -6px var(--red-d); }
.nav-btn-gray { background: #e7e7e7; color: var(--black); }
.nav-btn-gray:hover { background: #d0d0d0; }

/* ─── PIXEL CONTAINER (pbox) ─────────────────────── */
.pbox {
  position: relative;
  background: var(--white);
  padding: 18px 18px 14px;
  margin: 4px;
  border-style: solid; border-width: 4px;
  border-image-slice: 2; border-image-width: 2;
  border-image-outset: 2; border-image-source: var(--pb5);
  border-image-repeat: stretch;
}
.pbox > .title {
  display: table;
  padding: 0 8px;
  margin: -2.2rem 0 0.9rem;
  font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase;
  background: var(--white);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-weight: 700;
}

/* ─── FORM FIELDS ────────────────────────────────── */
.fg { margin-bottom: 0; }
.fg label {
  display: block; font-size: 11px; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--dim);
  margin-bottom: 6px; font-weight: 600;
}
.fg input {
  background: var(--white); color: var(--black);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px; outline: none;
  border-style: solid; border-width: 4px;
  border-image-slice: 2; border-image-width: 2;
  border-image-outset: 2; border-image-source: var(--pb5);
  border-image-repeat: stretch; margin: 4px 0;
}
.fg input:focus {
  border-image-source: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='5' height='5'%3E%3Cpath d='M2 1 h1 v1 h-1 z M1 2 h1 v1 h-1 z M3 2 h1 v1 h-1 z M2 3 h1 v1 h-1 z' fill='%23209cee'/%3E%3C/svg%3E");
}

/* ─── MAIN LAYOUT ────────────────────────────────── */
main {
  flex: 1;
  padding: 20px 24px;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

/* ─── SOURCE TABS ────────────────────────────────── */
.source-tabs {
  display: flex; gap: 0;
  margin-bottom: 20px;
}
.source-tab {
  padding: 6px 18px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--dim);
  border-bottom: 3px solid transparent;
  user-select: none;
}
.source-tab:hover { color: var(--black); }
.source-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ─── STATS BAR ──────────────────────────────────── */
.stats {
  display: flex; gap: 28px; flex-wrap: wrap;
  margin-bottom: 4px;
}
.stat-item { display: flex; flex-direction: column; gap: 3px; }
.stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-val   { font-size: 20px; font-weight: 700; color: var(--red); }

/* ─── TOOLBAR ────────────────────────────────────── */
.toolbar {
  display: flex; gap: 4px; align-items: center;
  margin-bottom: 20px; flex-wrap: wrap;
}
.toolbar .fg { flex: 1; min-width: 220px; }
.toolbar .fg input { width: 100%; padding: 6px 10px; }

/* ─── RECORD CARD ────────────────────────────────── */
.record-card {
  position: relative;
  background: var(--white);
  padding: 16px 18px 14px;
  margin: 4px 4px 14px;
  border-style: solid; border-width: 4px;
  border-image-slice: 2; border-image-width: 2;
  border-image-outset: 2; border-image-source: var(--pb5);
  border-image-repeat: stretch;
}
.record-card::after {
  position: absolute; top: -4px; right: -4px; bottom: -4px; left: -4px;
  content: ""; box-shadow: inset -4px -4px var(--shadow);
  pointer-events: none;
}

.card-header {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 12px;
}
.card-index {
  background: var(--black); color: var(--white);
  min-width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.card-title { font-size: 14px; font-weight: 700; }
.card-time  { font-size: 11px; color: var(--dim); margin-top: 3px; }
.card-badge {
  margin-left: auto; padding: 3px 10px; flex-shrink: 0;
  font-size: 10px; font-weight: 600;
  border-style: solid; border-width: 4px;
  border-image-slice: 2; border-image-width: 2;
  border-image-outset: 2;
  border-image-source: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='5' height='5'%3E%3Cpath d='M2 1 h1 v1 h-1 z M1 2 h1 v1 h-1 z M3 2 h1 v1 h-1 z M2 3 h1 v1 h-1 z' fill='%234aa52e'/%3E%3C/svg%3E");
  color: var(--green-d); background: #f0fbe0;
}

.card-meta {
  display: flex; gap: 20px; flex-wrap: wrap;
  font-size: 11px; color: var(--dim); margin-bottom: 10px;
}
.card-meta span { display: flex; flex-direction: column; gap: 2px; }
.card-meta em   { color: var(--red); font-style: normal; font-size: 14px; font-weight: 700; }

.card-hash {
  font-size: 10px; color: var(--blue);
  background: #f4f8fc;
  padding: 6px 10px; word-break: break-all;
  margin-bottom: 10px;
  border-left: 4px solid var(--black);
  font-family: 'Courier New', monospace;
}

.winners-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center; margin-bottom: 6px;
}
.winners-row.collapsed {
  max-height: 82px; /* 2 rows × ~32px + 6px gap + 6px outset/padding */
  overflow: hidden;
  padding: 4px;
  margin: -4px;
}
.winners-toggle {
  font-size: 11px; color: var(--blue); cursor: pointer;
  margin-bottom: 8px; display: none; background: none;
  border: none; padding: 0; font-family: inherit;
}
.winners-toggle:hover { text-decoration: underline; }
.winner-chip {
  background: var(--red); color: var(--white);
  padding: 4px 4px; font-size: 13px; font-weight: 700;
  position: relative;
  border-style: solid; border-width: 4px;
  border-image-slice: 2; border-image-width: 2;
  border-image-outset: 2; border-image-source: var(--pb5);
}
.winner-chip::after {
  position: absolute; top: -4px; right: -4px; bottom: -4px; left: -4px;
  content: ""; box-shadow: inset -4px -4px var(--red-d);
}

.card-actions {
  display: flex; gap: 0; flex-wrap: wrap;
  padding-top: 10px; border-top: 2px solid #eee;
}

/* ─── EMPTY STATE ────────────────────────────────── */
.empty {
  text-align: center; padding: 60px 20px; color: var(--dim);
}
.empty .big { font-size: 48px; margin-bottom: 14px; }
.empty p { font-size: 13px; line-height: 2; }

/* ─── PAGINATION ─────────────────────────────────── */
.pagination {
  display: flex; gap: 0; justify-content: center;
  margin-top: 20px; flex-wrap: wrap;
}

/* ─── FOOTER ─────────────────────────────────────── */
.site-footer {
  padding: 8px 20px; font-size: 11px; color: var(--dim);
  flex-shrink: 0; display: flex; gap: 18px; align-items: center;
  flex-wrap: wrap; background: var(--white);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.site-footer a { color: var(--dim); text-decoration: none; }
.site-footer a:hover { color: var(--black); }

/* ─── MOBILE ─────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --header-h: 56px; }
  .header-inner { padding: 0 14px; gap: 8px; }
  .global-header .logo { font-size: 36px; }
  .global-header h1 { font-size: 14px; }
  .global-header p  { display: none; }
  .nav-btn { padding: 4px 8px; font-size: 12px; }
  main { padding: 12px 10px; }
  .toolbar .fg { flex: none; width: 35vw; min-width: 0; }
  .toolbar .fg input { width: 100%; }
  .site-footer { gap: 8px; font-size: 10px; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     GLOBAL HEADER
══════════════════════════════════════════════════ -->
<header class="global-header">
  <div class="header-inner">
    <span class="logo">🎲</span>
    <div>
      <h1>OpenLuck</h1>
      <p>历史抽奖记录 — 完全公开可验证</p>
    </div>
    <nav>
      <a href="index.html" class="nav-btn nav-btn-red">🎲 发起抽奖</a>
      <a href="https://github.com/Xyinkl/OpenLuck" target="_blank" class="nav-btn nav-btn-gray">⭐ GitHub</a>
    </nav>
  </div>
</header>

<!-- ══════════════════════════════════════════════════
     MAIN
══════════════════════════════════════════════════ -->
<main>

  <!-- Source toggle -->
  <div class="source-tabs">
    <div class="source-tab active" id="tab-server" onclick="switchSource('server')">🌐 服务器记录</div>
    <div class="source-tab" id="tab-local" onclick="switchSource('local')">💾 本地记录</div>
  </div>

  <!-- Stats -->
  <div class="pbox" id="statsBar" style="margin-bottom:16px;">
    <p class="title">抽奖统计</p>
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">总抽奖次数</span>
        <span class="stat-val" id="statTotal">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">参与总人次</span>
        <span class="stat-val" id="statParticipants">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">最近一次</span>
        <span class="stat-val" id="statLatest">—</span>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="fg">
      <input id="searchInput" type="text" placeholder="搜索标题 / 区块号 / 哈希…" oninput="render()">
    </div>
    <button class="btn btn-red btn-sm" onclick="document.getElementById('searchInput').value='';render()">清空</button>
    <button class="btn btn-blue btn-sm" onclick="loadRecords()">刷新</button>
    <button class="btn btn-yellow btn-sm" onclick="exportJSON()">导出</button>
  </div>

  <!-- Records list -->
  <div id="recordsList"></div>
  <div class="pagination" id="paginationBar"></div>

</main>

<!-- ══════════════════════════════════════════════════
     FOOTER
══════════════════════════════════════════════════ -->
<footer class="site-footer">
  <span>OpenLuck · 历史抽奖记录</span>
  <a href="index.html">发起抽奖</a>
  <a href="https://github.com/Xyinkl/OpenLuck" target="_blank">GitHub</a>
  <a href="https://etherscan.io" target="_blank">Etherscan</a>
</footer>

<script>
const PAGE_SIZE = 10;

let allRecords  = [];
let currentPage = 1;
let currentSrc  = 'server';

// ── SOURCE SWITCH ──────────────────────────────
function switchSource(src) {
  currentSrc = src;
  document.getElementById('tab-server').classList.toggle('active', src === 'server');
  document.getElementById('tab-local').classList.toggle('active',  src === 'local');
  loadRecords();
}

// ── LOAD RECORDS ───────────────────────────────
async function loadRecords() {
  const listEl = document.getElementById('recordsList');
  listEl.innerHTML = '<div class="empty"><div class="big">⏳</div><p>加载中…</p></div>';

  if (currentSrc === 'local') {
    allRecords = JSON.parse(localStorage.getItem('openluck_records') || '[]');
    allRecords.sort((a, b) => (b.targetBlock || 0) - (a.targetBlock || 0));
    currentPage = 1;
    render();
    return;
  }

  try {
    const r = await fetch('/api/lottery');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allRecords = await r.json();
    allRecords.sort((a, b) => (b.targetBlock || 0) - (a.targetBlock || 0));
  } catch (e) {
    allRecords = JSON.parse(localStorage.getItem('openluck_records') || '[]');
    allRecords.sort((a, b) => (b.targetBlock || 0) - (a.targetBlock || 0));
    if (allRecords.length === 0) {
      listEl.innerHTML = `<div class="empty">
        <div class="big">🔌</div>
        <p>服务器暂时无法连接。<br>已切换到本地记录（共 ${allRecords.length} 条）。</p></div>`;
      updateStats(allRecords);
      return;
    }
  }

  currentPage = 1;
  render();
}

// ── RENDER ─────────────────────────────────────
function render() {
  const q        = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = allRecords.filter(r => {
    if (!q) return true;
    return (
      (r.title       || '').toLowerCase().includes(q) ||
      (r.blockHash   || '').toLowerCase().includes(q) ||
      String(r.targetBlock || '').includes(q)
    );
  });

  updateStats(filtered);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = 1;

  const slice  = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  const listEl = document.getElementById('recordsList');

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty">
      <div class="big">🎲</div>
      <p>${allRecords.length === 0
        ? '还没有任何抽奖记录。<br>去发起第一次抽奖吧！'
        : '没有匹配的记录。'}</p>
      ${allRecords.length === 0
        ? '<br><a href="index.html" style="color:var(--red);font-size:13px;font-weight:700;">→ 发起抽奖</a>'
        : ''}
    </div>`;
    document.getElementById('paginationBar').innerHTML = '';
    return;
  }

  const totalCount = filtered.length;
  listEl.innerHTML = slice.map((rec, i) => buildCard(rec, totalCount - ((currentPage - 1) * PAGE_SIZE + i))).join('');
  requestAnimationFrame(initWinnersCollapse);

  // Pagination
  const pbar = document.getElementById('paginationBar');
  if (totalPages <= 1) { pbar.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1)
    html += `<button class="btn btn-sm" onclick="gotoPage(${currentPage - 1})">◀ 上一页</button>`;
  for (let p = 1; p <= totalPages; p++) {
    if (p === currentPage)
      html += `<button class="btn btn-blue btn-sm">${p}</button>`;
    else if (p <= 2 || p >= totalPages - 1 || Math.abs(p - currentPage) <= 1)
      html += `<button class="btn btn-sm" onclick="gotoPage(${p})">${p}</button>`;
    else if (Math.abs(p - currentPage) === 2)
      html += `<span style="color:var(--dim);padding:5px 4px;line-height:2;">…</span>`;
  }
  if (currentPage < totalPages)
    html += `<button class="btn btn-sm" onclick="gotoPage(${currentPage + 1})">下一页 ▶</button>`;
  pbar.innerHTML = html;
}

function gotoPage(p) { currentPage = p; render(); window.scrollTo(0, 0); }

// ── BUILD CARD ─────────────────────────────────
function buildCard(rec, idx) {
  const winners  = (rec.winners || []).map(w => `<span class="winner-chip">#&thinsp;${w}</span>`).join('');
  const dateStr  = rec.completedAt ? new Date(rec.completedAt).toLocaleString('zh-CN') : '—';
  const hashDisp = rec.blockHash   ? rec.blockHash : '—';
  const esUrl    = rec.targetBlock ? `https://etherscan.io/block/${rec.targetBlock}` : '#';

  return `
  <div class="record-card" id="card-${idx}">
    <div class="card-header">
      <div class="card-index">${idx}</div>
      <div>
        <div class="card-title">${esc(rec.title && rec.title !== '未命名抽奖' ? rec.title : '匿名抽奖')}</div>
        <div class="card-time">${dateStr}</div>
      </div>
      <span class="card-badge">已完成</span>
    </div>

    <div class="card-meta">
      <span><span>区块号</span><em>#${(rec.targetBlock || '—').toLocaleString()}</em></span>
      <span><span>总人数</span><em>${rec.total || '—'}</em></span>
      <span><span>中奖人数</span><em>${rec.count || (rec.winners || []).length}</em></span>
    </div>

    <div class="card-hash">${esc(hashDisp)}</div>
    <div class="winners-row" id="wr-${idx}">${winners}</div>
    <button class="winners-toggle" id="wt-${idx}" onclick="toggleWinners(${idx})">▼ 展开全部</button>

    <div class="card-actions">
      <a href="${esUrl}" target="_blank" class="btn btn-sm">🔍 验证区块 Hash</a>
      <button class="btn btn-sm" onclick="copyCard(${idx - 1})">📋 复制结果</button>
      <button class="btn btn-yellow btn-sm" onclick="openVerifier(${idx - 1})">⚙ 验证算法</button>
    </div>
  </div>`;
}

// ── WINNERS COLLAPSE ───────────────────────────
function initWinnersCollapse() {
  document.querySelectorAll('.winners-row').forEach(row => {
    const id  = row.id.replace('wr-', '');
    const btn = document.getElementById('wt-' + id);
    if (!btn) return;
    // Check if content overflows 2-row height
    const natural = row.scrollHeight;
    if (natural > 86) {
      row.classList.add('collapsed');
      btn.style.display = 'inline';
    }
  });
}

function toggleWinners(idx) {
  const row = document.getElementById('wr-' + idx);
  const btn = document.getElementById('wt-' + idx);
  const collapsed = row.classList.toggle('collapsed');
  btn.textContent = collapsed ? '▼ 展开全部' : '▲ 收起';
}

// ── STATS ──────────────────────────────────────
function updateStats(records) {
  document.getElementById('statTotal').textContent        = records.length;
  document.getElementById('statParticipants').textContent = records.reduce((s, r) => s + (r.total || 0), 0);
  const latest = records[0];
  document.getElementById('statLatest').textContent = latest
    ? (latest.completedAt ? new Date(latest.completedAt).toLocaleDateString('zh-CN') : '—')
    : '—';
}

// ── COPY CARD ──────────────────────────────────
function copyCard(rawIdx) {
  const rec = getFiltered()[rawIdx];
  if (!rec) return;
  const text = [
    '【OpenLuck 抽奖结果】',
    `标题：${rec.title || '未命名'}`,
    `区块：#${rec.targetBlock}`,
    `哈希：${rec.blockHash}`,
    `总人数：${rec.total}  中奖 ${rec.count || rec.winners.length} 人`,
    `中奖号码：${(rec.winners || []).join(', ')}`,
    `时间：${rec.completedAt ? new Date(rec.completedAt).toLocaleString('zh-CN') : ''}`,
    `Etherscan：https://etherscan.io/block/${rec.targetBlock}`,
    `验证代码：https://github.com/Xyinkl/OpenLuck`,
  ].join('\n');
  navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
}

// ── OPEN VERIFIER ──────────────────────────────
function openVerifier(rawIdx) {
  const rec = getFiltered()[rawIdx];
  if (!rec) return;
  const hash = (rec.blockHash || '').replace('0x', '');
  const code = `# OpenLuck 验证代码\nimport hashlib\n\nBLOCK_HASH = "${hash}"\nTOTAL      = ${rec.total}\nCOUNT      = ${rec.count || rec.winners.length}\n\nwinners, selected, rnd = [], set(), 0\nwhile len(winners) < COUNT:\n    seed = f"{BLOCK_HASH}{rnd:04x}".encode()\n    h    = hashlib.sha256(seed).hexdigest()\n    num  = int(h[:16], 16) % TOTAL + 1\n    if num not in selected:\n        selected.add(num)\n        winners.append(num)\n    rnd += 1\n\nprint("中奖号码:", sorted(winners))\nprint("预期结果:", ${JSON.stringify(rec.winners)})\nprint("验证通过:", sorted(winners) == sorted(${JSON.stringify(rec.winners)}))`;

  navigator.clipboard.writeText(code).then(() => {
    alert('验证代码已复制到剪贴板！\n请粘贴到在线 Python 平台运行。\n\n即将打开 OnlinePython…');
    window.open('https://www.online-python.com', '_blank');
  });
}

// ── EXPORT JSON ────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(allRecords, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `openluck_history_${Date.now()}.json`;
  a.click();
}

// ── HELPERS ────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function getFiltered() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  return allRecords.filter(r => {
    if (!q) return true;
    return (r.title || '').toLowerCase().includes(q) ||
      (r.blockHash || '').toLowerCase().includes(q) ||
      String(r.targetBlock || '').includes(q);
  });
}

// ── INIT ───────────────────────────────────────
loadRecords();
</script>
</body>
</html>
